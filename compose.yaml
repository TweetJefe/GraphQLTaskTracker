services:
  db:
    image: postgres:16-alpine
    container_name: tasktracker-db
    env_file:
      - .env
    ports:
      - "5434:5432"
    volumes:
      - tasktracker-db-data:/var/lib/postgresql/data
    networks:
      - tasktracker-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tasktracker"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: tasktracker-api
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/tasktracker
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_BOT_NAME: ${TELEGRAM_BOT_NAME}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - tasktracker-network

networks:
  tasktracker-network:
    driver: bridge

volumes:
  tasktracker-db-data: