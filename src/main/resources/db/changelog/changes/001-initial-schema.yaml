databaseChangeLog:
  - changeSet:
      id: 1
      author: alex
      changes:
        - createTable:
            tableName: users
            columns:
              - column: {name: id, type: bigint, autoIncrement: true, constraints: {primaryKey: true, nullable: false}}
              - column: {name: telegram_id, type: bigint, constraints: {nullable: false, unique: true}}
              - column: {name: username, type: varchar(255)}
              - column: {name: name, type: varchar(255)}
              - column: {name: language_code, type: varchar(255)}
              - column: { name: created_at, type: timestamp, defaultValueComputed: 'CURRENT_TIMESTAMP' }
              - column: { name: updated_at, type: timestamp, defaultValueComputed: 'CURRENT_TIMESTAMP' }

  - changeSet:
      id: 2
      author: alex
      changes:
        - createTable:
            tableName: projects
            columns:
              - column: {name: id, type: bigint, autoIncrement: true, constraints: {primaryKey: true, nullable: false}}
              - column: {name: name, type: varchar(255), constraints: {nullable: false}}
              - column: {name: description, type: text}
              - column: {name: status, type: varchar(50), defaultValue: 'ACTIVE'}
              - column: {name: started_at, type: timestamp, defaultValueComputed: 'CURRENT_TIMESTAMP'}
              - column: {name: updated_at, type: timestamp, defaultValueComputed: 'CURRENT_TIMESTAMP'}
              - column: {name: reporter_id, type: bigint}
              - column: {name: pin_code_hash, type: varchar(255)}
        - addForeignKeyConstraint:
            baseTableName: projects
            baseColumnNames: reporter_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_project_reporter

  - changeSet:
      id: 3
      author: alex
      changes:
        - createTable:
            tableName: tasks
            columns:
              - column: {name: id, type: bigint, autoIncrement: true, constraints: {primaryKey: true, nullable: false}}
              - column: {name: name, type: varchar(255), constraints: {nullable: false}}
              - column: {name: description, type: text}
              - column: {name: status, type: varchar(50), defaultValue: 'TODO'}
              - column: {name: priority, type: varchar(50), defaultValue: 'MIDDLE'}
              - column: {name: project_id, type: bigint}
              - column: {name: assignee_id, type: bigint}
              - column: {name: reporter_id, type: bigint}
              - column: {name: created_at, type: timestamp, defaultValueComputed: 'CURRENT_TIMESTAMP'}
              - column: {name: updated_at, type: timestamp, defaultValueComputed: 'CURRENT_TIMESTAMP'}
              - column: {name: dead_line, type: timestamp}
        - addForeignKeyConstraint: {baseTableName: tasks, baseColumnNames: project_id, referencedTableName: projects, referencedColumnNames: id, constraintName: fk_task_project, onDelete: CASCADE}
        - addForeignKeyConstraint: {baseTableName: tasks, baseColumnNames: assignee_id, referencedTableName: users, referencedColumnNames: id, constraintName: fk_task_assignee}
        - addForeignKeyConstraint: {baseTableName: tasks, baseColumnNames: reporter_id, referencedTableName: users, referencedColumnNames: id, constraintName: fk_task_reporter}

  - changeSet:
      id: 4
      author: alex
      changes:
        - createTable:
            tableName: project_assignees
            columns:
              - column: {name: project_id, type: bigint, constraints: {nullable: false}}
              - column: {name: assignee_id, type: bigint, constraints: {nullable: false}}
        - addPrimaryKey: {tableName: project_assignees, columnNames: "project_id, assignee_id", constraintName: pk_project_assignees}
        - addForeignKeyConstraint: {baseTableName: project_assignees, baseColumnNames: project_id, referencedTableName: projects, referencedColumnNames: id, constraintName: fk_pa_project, onDelete: CASCADE}
        - addForeignKeyConstraint: {baseTableName: project_assignees, baseColumnNames: assignee_id, referencedTableName: users, referencedColumnNames: id, constraintName: fk_pa_assignee, onDelete: CASCADE}